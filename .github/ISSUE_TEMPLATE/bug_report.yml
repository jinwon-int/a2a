name: Bug report
about: Report a public-safe A2A bug with redacted evidence
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Keep this issue public-safe: no secrets, private hostnames, provider IDs, Telegram IDs, raw session dumps, or production data.
  - type: input
    id: component
    attributes:
      label: Component
      description: broker, OpenClaw plugin, Docker runner, contracts, docs, or examples
      placeholder: broker
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Local reproduction
      description: Use local-only steps and safe placeholders.
      placeholder: |
        1. Run local broker on http://127.0.0.1:8787
        2. Start <local-echo-worker>
        3. Submit no-live test task
    validations:
      required: false
  - type: textarea
    id: evidence
    attributes:
      label: Redacted evidence
      description: Paste only redacted logs or summaries.
    validations:
      required: false
  - type: checkboxes
    id: safety
    attributes:
      label: Safety confirmation
      options:
        - label: I did not include secrets, private endpoints, provider IDs, Telegram IDs, production data, raw session dumps, or OpenClaw runtime/bootstrap files.
          required: true
        - label: I did not change repo visibility, deploy, restart services, mutate production DB/outbox state, send live provider/Telegram messages, rotate secrets, rewrite history, or force push.
          required: true
